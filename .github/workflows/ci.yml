name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inspectflow_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/inspectflow_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            inspectflow/backend/package-lock.json

      - name: Validate coordination queue
        run: npm run coordination:check
        working-directory: inspectflow

      - name: Install backend dependencies
        run: npm ci
        working-directory: inspectflow/backend

      - name: Run backend tests
        run: npm test
        working-directory: inspectflow/backend

  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            inspectflow/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: inspectflow/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: inspectflow/frontend

      - name: Run frontend UI tests
        run: npm run test:ui
        working-directory: inspectflow/frontend
